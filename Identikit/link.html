<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyndsy Camara</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{

      min-height:100vh;

      background:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
      url("https://images.unsplash.com/photo-1511884642898-4c92249e20b6?auto=format&fit=crop&w=1600&q=80");

      background-size:cover;
      background-position:center;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:30px;
    }

    .card{

      width:100%;
      max-width:420px;

      background:rgba(255,255,255,0.12);

      backdrop-filter:blur(12px);

      border:1px solid rgba(255,255,255,0.2);

      border-radius:30px;

      padding:40px 30px;

      text-align:center;

      box-shadow:0 8px 30px rgba(0,0,0,0.35);
    }

    .profile-img{

      width:130px;
      height:130px;

      border-radius:50%;

      object-fit:cover;

      border:4px solid white;

      margin-bottom:20px;

      box-shadow:0 5px 20px rgba(0,0,0,0.3);
    }

    h1{
      color:white;
      font-size:34px;
      margin-bottom:10px;
    }

    .subtitle{
      color:#d9d9d9;
      font-size:17px;
      margin-bottom:30px;
      line-height:1.6;
    }

    .socials{
      margin-bottom:30px;
    }

    .socials a{

      color:white;

      text-decoration:none;

      margin:0 10px;

      font-size:15px;

      transition:0.3s;
    }

    .socials a:hover{
      color:#9fc1ff;
    }

    .links{

      display:flex;
      flex-direction:column;

      gap:18px;
    }

    .links a{

      background:rgba(255,255,255,0.15);

      border:1px solid rgba(255,255,255,0.18);

      color:white;

      text-decoration:none;

      padding:18px;

      border-radius:18px;

      font-size:18px;

      font-weight:bold;

      transition:0.3s;

      backdrop-filter:blur(10px);
    }

    .links a:hover{

      transform:translateY(-5px) scale(1.03);

      background:rgba(255,255,255,0.22);

      box-shadow:0 8px 20px rgba(0,0,0,0.25);
    }

    footer{

      margin-top:30px;

      color:#d5d5d5;

      font-size:13px;
    }

    @media(max-width:500px){

      .card{
        padding:35px 22px;
      }

      h1{
        font-size:28px;
      }

      .links a{
        font-size:16px;
      }

    }

  </style>
</head>

<body>

  <main class="card">

    <img 
    class="profile-img"
    img src="../imagenes/lyndsy.jpeg" alt="Foto de perfil de Lyndsy Camara">

    <h1>Lyndsy Camara</h1>

    <p class="subtitle">
      🎓 Estudiante de Lic. en Gestión en Sistemas<br>
      🎾 Tennis Coach
      <br>
    </p>

    <div class="socials">

      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
      <a href="#">LinkedIn</a>

    </div>

    <div class="links">

      <a href="https://lyndsy02.github.io/IdentikitCamara/?classId=98e54cd3-650e-426e-86df-17629f18a41a&assignmentId=aba69161-93fe-484c-a321-98623619d450&submissionId=59e61c22-ce08-d982-8699-fa76f6ed23a4">🎾 Mi página web</a>

      <a href="link.html">🐾 Proyecto Huellitas</a>

    </div>

    <footer>
      © 2026 • Lyndsy Camara
    </footer>

  </main>

</body>
</html>
